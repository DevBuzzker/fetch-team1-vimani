<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <script src="main.js" type="module"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- <script src="getPokemonAll.js" type="module"></script> -->
</head>

<body>
  <nav
    class="fixed top-0 left-0 w-full flex items-center justify-between px-6 py-4 bg-white/25 backdrop-blur-xs border-b border-white/30 shadow-md">
    <div class="text-xl font-bold text-red-600 tracking-wide">
      Pokédex Diary
    </div>
    <div class="flex items-center gap-6">
      <div class="flex items-center gap-2">
        <input type="text" id="searchInput" placeholder="Searching for Pokémon..."
          class="px-3 py-1 rounded-full border border-gray-300 text-sm" />
        <button id="searchButton" class="flex items-center justify-center text-gray-600 hover:text-red-600 transition">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
            <path fill-rule="evenodd"
              d="M10.5 3.75a6.75 6.75 0 1 0 0 13.5 6.75 6.75 0 0 0 0-13.5ZM2.25 10.5a8.25 8.25 0 1 1 14.59 5.28l4.69 4.69a.75.75 0 1 1-1.06 1.06l-4.69-4.69A8.25 8.25 0 0 1 2.25 10.5Z"
              clip-rule="evenodd" />
          </svg>
        </button>
      </div>
      <div>
        <a class="px-3 py-1 rounded-full font-medium transition hover:bg-red-500 hover:text-white hover:shadow-md"
          href="index.html">Home</a>

        <a class="px-3 py-1 rounded-full font-medium transition hover:bg-red-500 hover:text-white hover:shadow-md"
          href="pokedex.html">Pokédex</a>
      </div>
    </div>
  </nav>

  <main class="pt-24 gap-4 min-h-screen">
    <div id="controls" class="m-4"></div>
    <div id="pokemons" class="flex flex-wrap justify-center"></div>
  </main>

  <dialog id="pokemonDialog" class="p-2 rounded-xl w-80 shadow-xl m-auto">
    <div class="bg-white p-5 flex flex-col items-center gap-3">
      <h2 id="dialogName" class="text-xl font-bold capitalize"></h2>
      <img id="dialogImage" class="w-50 h-50" />
      <p id="dialogStats" class="text-sm text-gray-600 text-center"></p>
      <button id="closeDialog" class="mt-3 px-4 py-1 bg-red-500 text-white rounded-full hover:bg-red-600">
        Close
      </button>
    </div>
  </dialog>
  <footer class="w-full text-center px-6 py-4 bg-white/25 backdrop-blur-xs border-t border-white/30 shadow-md mt-8">
    <p class="text-sm text-gray-700">
      Pokédex Diary — Built with
      <a href="https://pokeapi.co" target="_blank" class="text-red-500 hover:underline">PokéAPI</a>
    </p>
    <p class="text-xs text-gray-400 mt-1">© 2026 Team</p>
  </footer>
</body>

</html>
